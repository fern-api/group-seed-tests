name: Package Seed Test
description: Provide a description here
author: Fern

# Action branding. This will appear on the GitHub Marketplace. CHRISM - this true? repo is private
branding:
  icon: box
  color: green

# Define inputs
inputs:
  seed-generator-alias:
    description: The alias of the seed generator to use
    required: true
  max-runner-count:
    description:
      The maximum number of runners that can be used (determines upper limit of
      packages)
    required: true
  split-tests-cutoff-time-in-seconds:
    description: The cutoff time in seconds to split tests into multiple runners
    required: true
  seed-test-log-file-path:
    description: Log file to parse test output from
    required: true

# Define outputs
outputs:
  json-file-contents:
    description: 'All information in JSON format for packaging tests'

runs:
  using: node24
  main: dist/index.js
